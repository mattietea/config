name: Setup devenv
description: Install Nix, configure the devenv cachix cache, and install devenv.
runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@v31
    - uses: cachix/cachix-action@v16
      with:
        name: devenv
    - name: Install devenv
      shell: bash
      run: nix profile install nixpkgs#devenv
