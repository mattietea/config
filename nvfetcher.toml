# Auto-updatable prebuilt sources. Run `nvfetcher` to refresh pins.
# Generates ./_sources/generated.nix (consumed via pkgs.callPackage).
# This replaces the hand-rolled `update-clis` script.
#
# src.prefix = "v" strips the leading "v" from the release tag, so $ver is the
# bare version (e.g. 0.65.0); we re-add the "v" in the URL path where needed.

[pup]
src.github = "datadog-labs/pup"
src.prefix = "v"
fetch.url = "https://github.com/datadog-labs/pup/releases/download/v$ver/pup_$ver_Darwin_arm64.tar.gz"

[linear]
src.github = "schpet/linear-cli"
src.prefix = "v"
fetch.url = "https://github.com/schpet/linear-cli/releases/download/v$ver/linear-aarch64-apple-darwin.tar.xz"

# opencode loads this by npm name, so we only need its VERSION tracked here
# (the same one mechanism as the binaries). fetch.github just gives nvfetcher a
# source to resolve the version from; the src itself is unused — the opencode
# plugin string consumes `sources.oh-my-openagent.version`.
[oh-my-openagent]
src.github = "code-yeongyu/oh-my-openagent"
src.prefix = "v"
fetch.url = "https://github.com/code-yeongyu/oh-my-openagent/archive/refs/tags/v$ver.tar.gz"

[wacli]
src.github = "openclaw/wacli"
src.prefix = "v"
fetch.url = "https://github.com/openclaw/wacli/releases/download/v$ver/wacli_$ver_darwin_universal.tar.gz"

# mole is a shell CLI (mole/mo + lib/ + bin/*.sh) plus two Go binaries
# (cmd/analyze, cmd/status). We build from source via buildGoModule and assemble
# the shell tree — see modules/home-manager/packages/mole/package.nix. Tags are
# capitalised (V1.43.1), so prefix = "V" yields the bare $ver.
[mole]
src.github = "tw93/mole"
src.prefix = "V"
fetch.url = "https://github.com/tw93/mole/archive/refs/tags/V$ver.tar.gz"

# claude-mem ships a fully self-contained prebuilt npm tarball: the CLI
# (dist/npx-cli/index.js) and every plugin script (plugin/scripts/*.cjs) are
# pre-bundled with dependencies inlined, so there are no node_modules to build.
# Version tracks npm's dist-tags `latest` (not the GitHub tag) so the fetched
# tarball always exists — avoids the npm-publish-lags-GitHub-tag race.
[claude-mem]
src.webpage = "https://registry.npmjs.org/-/package/claude-mem/dist-tags"
src.regex = '"latest":"([^"]+)"'
fetch.url = "https://registry.npmjs.org/claude-mem/-/claude-mem-$ver.tgz"

